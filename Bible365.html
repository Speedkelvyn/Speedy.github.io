<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1208">
  <title>Daily Word · 365</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment:    #faf7f0;
      --cream:        #f4efe4;
      --card:         #fffdf8;
      --ink:          #1a1208;
      --ink-muted:    #7a6e5f;
      --ink-light:    #b5a99a;
      --gold:         #b8860b;
      --gold-bright:  #d4a017;
      --gold-pale:    #f5e9c8;
      --sage:         #2d6a4f;
      --sage-pale:    #d8f0e6;
      --border:       #e6dece;
      --shadow-warm:  rgba(120, 90, 40, 0.10);

      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Lora', Georgia, serif;
      --font-ui:      'DM Sans', system-ui, sans-serif;
    }

    html { height: 100%; }

    body {
      font-family: var(--font-ui);
      background: var(--parchment);
      color: var(--ink);
      min-height: 100%;
      min-height: 100dvh;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 150px 150px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── DECORATIVE HEADER BAND ── */
    .top-band {
      background: var(--ink);
      padding: calc(env(safe-area-inset-top) + 18px) 24px 18px;
      position: relative;
      overflow: hidden;
    }
    .top-band::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent, transparent 30px,
        rgba(255,255,255,0.03) 30px, rgba(255,255,255,0.03) 31px
      );
    }
    .top-band-inner {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative; z-index: 1;
    }
    .app-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .app-title span {
      color: var(--gold-bright);
      font-style: italic;
    }
    .app-subtitle {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-top: 5px;
    }
    .btn-today {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      background: var(--gold-bright);
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-today:active { transform: scale(0.95); }

    /* ── PROGRESS STRIP ── */
    .progress-strip {
      background: var(--ink);
      padding: 0 24px 16px;
    }
    .progress-strip-inner {
      max-width: 520px;
      margin: 0 auto;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 8px;
    }
    .progress-meta .done-count { color: var(--gold-bright); }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-bright));
      border-radius: 2px;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── MAIN CONTENT ── */
    .main {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 16px calc(env(safe-area-inset-bottom) + 32px);
      position: relative; z-index: 1;
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px var(--shadow-warm), 0 1px 3px rgba(0,0,0,0.04);
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* ── DAY NAVIGATOR ── */
    .nav-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px;
    }
    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--cream);
      color: var(--ink);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.12s, opacity 0.2s;
      user-select: none;
    }
    .nav-btn:not(:disabled):active { transform: scale(0.92); background: var(--gold-pale); }
    .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }

    .day-info { text-align: center; flex: 1; }
    .day-number {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
    }
    .day-date {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-muted);
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    /* ── READING CARD ── */
    .reading-card { padding: 24px; }

    .reading-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reading-label::before {
      content: '';
      display: inline-block;
      width: 20px; height: 1.5px;
      background: var(--gold);
    }

    .reading-passages {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--ink);
      margin-bottom: 20px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .reading-passages.done {
      text-decoration: line-through;
      color: var(--ink-light);
      font-style: italic;
    }

    .reading-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-complete {
      flex: 1;
      min-width: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--cream);
      color: var(--ink-muted);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-complete .check-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--ink-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      transition: all 0.2s;
    }
    .btn-complete.done {
      background: var(--sage-pale);
      border-color: var(--sage);
      color: var(--sage);
    }
    .btn-complete.done .check-icon {
      background: var(--sage);
      border-color: var(--sage);
      color: #fff;
    }
    .btn-complete:active { transform: scale(0.97); }

    .btn-read {
      flex: 1;
      min-width: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border-radius: 14px;
      background: var(--ink);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-read:active { transform: scale(0.97); opacity: 0.88; }
    .btn-read .icon { font-size: 16px; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 24px;
    }

    /* ── JOURNAL CARD ── */
    .journal-card { padding: 24px; }
    .journal-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .journal-label::before {
      content: '';
      display: inline-block;
      width: 20px; height: 1.5px;
      background: var(--gold);
    }
    .journal-textarea {
      width: 100%;
      min-height: 140px;
      background: var(--parchment);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.65;
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .journal-textarea::placeholder { color: var(--ink-light); font-style: italic; }
    .journal-textarea:focus {
      border-color: var(--gold);
      background: #fff;
    }

    /* ── VERSE OF THE DAY (optional flourish) ── */
    .gold-rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 4px 24px 0;
      opacity: 0.5;
    }

    /* ── COMPLETION FLASH ── */
    @keyframes flash-green {
      0% { box-shadow: 0 0 0 0 rgba(45, 106, 79, 0.4); }
      60% { box-shadow: 0 0 0 12px rgba(45, 106, 79, 0); }
      100% { box-shadow: none; }
    }
    .card.flash { animation: flash-green 0.5s ease-out; }

    /* ── PAGE TRANSITION ── */
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reading-passages { animation: slide-in 0.25s ease; }

    /* ── SWIPE HINT ── */
    .swipe-hint {
      text-align: center;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--ink-light);
      margin-top: -8px;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 520px) {
      .main { padding-top: 28px; }
      .app-title { font-size: 32px; }
      .reading-passages { font-size: 24px; }
    }
  </style>
</head>

      <div>
        <div class="app-title">Daily <span>Word</span></div>
        <div class="app-subtitle">365-Day Blended Plan</div>

      <button class="btn-today" onclick="jumpToToday()">Today</button>
    </div>
  </div>

    </div>
  </div>

  <!-- MAIN -->

        <div class="day-date" id="day-date"></div>

    </div>

    <div class="swipe-hint" id="swipe-hint">Swipe left or right to navigate</div>

    <!-- Reading + Actions -->
    <div class="card" id="reading-card">
      <div class="reading-card">
        <div class="reading-label" id="reading-label">Assigned Reading</div>
        <div class="reading-passages" id="reading-text">Loading…</div>

        <div class="reading-actions">
          <button class="btn-complete" id="btn-complete" onclick="toggleComplete()">
            <div class="check-icon" id="check-icon"></div>
            <span id="complete-label">Mark Complete</span>
          </button>
          <a href="#" id="btn-read" target="_blank" class="btn-read">
            <span class="icon">📖</span> Read Now
          </a>
        </div>
      </div>
      <div class="gold-rule"></div>
      <div class="divider" style="margin-top:0; opacity:0.4;"></div>

      <!-- Journal -->
      <div class="journal-card">
        <div class="journal-label">Journal Notes</div>
        <textarea
          class="journal-textarea"
          id="notes"
          placeholder="What stood out to you today? Write a prayer or reflection…"
          oninput="saveNote()"

      </div>
    </div>

    "Amos 1-3, Mark 14","Amos 4-6, Mark 15","Amos 7-9, Mark 16","Obadiah, Luke 1","Jonah 1-4, Luke 2","Micah 1-3, Luke 3","Micah 4-7, Luke 4",
    "Nahum 1-3, Luke 5","Hab 1-3, Luke 6","Zeph 1-3, Luke 7","Haggai 1-2, Luke 8","Zech 1-3, Luke 9","Zech 4-6, Luke 10","Zech 7-9, Luke 11",
    "Zech 10-12, Luke 12","Zech 13-14, Luke 13","Mal 1-2, Luke 14","Mal 3-4, Luke 15","Ps 1-5, Luke 16","Ps 6-10, Luke 17","Ps 11-15, Luke 18",
    "Ps 16-20, Luke 19","Ps 21-25, Luke 20","Ps 26-30, Luke 21","Ps 31-35, Luke 22","Ps 36-40, Luke 23","Ps 41-45, Luke 24","Ps 46-50, John 1",
    "Ps 51-55, John 2","Ps 56-60, John 3","Ps 61-65, John 4","Ps 66-70, John 5","Ps 71-75, John 6","Ps 76-80, John 7","Ps 81-85, John 8",
    "Ps 86-90, John 9","Ps 91-95, John 10","Ps 96-100, John 11","Ps 101-105, John 12","Ps 106-110, John 13","Ps 111-115, John 14","Ps 116-118, John 15",
    "Ps 119:1-88, John 16","Ps 119:89-176, John 17","Ps 120-125, John 18","Ps 126-130, John 19","Ps 131-135, John 20","Ps 136-140, John 21","Ps 141-145, Prov 1-3",
    "Ps 146-150, Prov 4-6","Prov 7-9, Prov 10-12","Prov 13-15, Prov 16-18","Prov 19-21, Prov 22-24","Prov 25-27, Prov 28-31","Phil 1-2, Eph 1-3","Phil 3-4, Eph 4-6",
    "Col 1-2, 1 Jn 1-2","Col 3-4, 1 Jn 3-5","Titus 1-3, Jas 1-2","Philemon, Jas 3-5","1 Pet 1-3, 2 Pet 1-3","1 Pet 4-5, Jude","Ps 100, Rev 21-22",
    "Ps 150"
  ];

  // ── STORAGE ───────────────────────────────────────────────────────────────
  const store = {
    get(k) { try { return JSON.parse(localStorage.getItem(k) || '{}'); } catch { return {}; } },
    set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch { console.warn('Storage unavailable'); } }
  };

  // ── STATE ─────────────────────────────────────────────────────────────────
  let currentDay = 1;
  let completed  = store.get('bible365_done');
  let notesData  = store.get('bible365_notes');

  // ── UI REFS ───────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const el = {
    dayNum:   $('day-number'),
    dayDate:  $('day-date'),
    rdgText:  $('reading-text'),
    rdgLabel: $('reading-label'),
    btnComplete: $('btn-complete'),
    checkIcon:   $('check-icon'),
    completeLabel: $('complete-label'),
    btnRead:  $('btn-read'),
    notes:    $('notes'),
    btnPrev:  $('btn-prev'),
    btnNext:  $('btn-next'),
    doneCount:    $('done-count'),
    pctLabel:     $('pct-label'),
    progressFill: $('progress-fill'),
    rdgCard:  $('reading-card'),
  };

  // ── HELPERS ───────────────────────────────────────────────────────────────
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function getToday() {
    const now   = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    return Math.max(1, Math.min(365, Math.floor((now - start) / 86400000) + 1));
  }

  function dayToDate(dayNum) {
    const d = new Date(new Date().getFullYear(), 0, dayNum);
    return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }

  // ── RENDER ────────────────────────────────────────────────────────────────
  function render() {
    currentDay = Math.max(1, Math.min(365, currentDay));
    const verses   = plan[currentDay] || '—';
    const isDone   = !!completed[currentDay];

    el.dayNum.textContent  = `Day ${currentDay}`;
    el.dayDate.textContent = dayToDate(currentDay);

    // animate reading text
    el.rdgText.style.animation = 'none';
    el.rdgText.offsetHeight;       // reflow
    el.rdgText.style.animation    = '';
    el.rdgText.textContent = verses;
    el.rdgText.className   = 'reading-passages' + (isDone ? ' done' : '');

    // reading label
    el.rdgLabel.textContent = isDone ? '✓ Completed' : 'Assigned Reading';

    // complete button
    el.btnComplete.className     = 'btn-complete' + (isDone ? ' done' : '');
    el.checkIcon.textContent     = isDone ? '✓' : '';
    el.completeLabel.textContent = isDone ? 'Completed' : 'Mark Complete';

    // read link
    el.btnRead.href = `https://www.biblegateway.com/passage/?search=${encodeURIComponent(verses)}&version=NIV`;

    // nav
    el.btnPrev.disabled = currentDay === 1;
    el.btnNext.disabled = currentDay === 365;

    // notes
    el.notes.value = notesData[currentDay] || '';

    // progress
    const doneCount = Object.values(completed).filter(Boolean).length;
    const pct       = Math.round((doneCount / 365) * 100);
    el.doneCount.textContent    = doneCount;
    el.pctLabel.textContent     = pct + '%';
    el.progressFill.style.width = pct + '%';
  }

  // ── ACTIONS ───────────────────────────────────────────────────────────────
  function changeDay(delta) {
    currentDay = Math.max(1, Math.min(365, currentDay + delta));
    render();
    // hide swipe hint after first use
    $('swipe-hint').style.display = 'none';
  }

  function jumpToToday() {
    currentDay = getToday();
    render();
  }

  function toggleComplete() {
    completed[currentDay] = !completed[currentDay];
    store.set('bible365_done', completed);
    if (navigator.vibrate) navigator.vibrate(40);
    // flash card
    el.rdgCard.classList.remove('flash');
    el.rdgCard.offsetHeight;
    if (completed[currentDay]) el.rdgCard.classList.add('flash');
    render();
  }

  function saveNote() {
    notesData[currentDay] = el.notes.value;
    store.set('bible365_notes', notesData);
  }

  // ── SWIPE (MOBILE) ────────────────────────────────────────────────────────
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 60) {
      // only swipe on the main content area (not textarea)
      if (document.activeElement !== el.notes) changeDay(dx < 0 ? 1 : -1);
    }
  }, { passive: true });

  // ── INIT ──────────────────────────────────────────────────────────────────
  currentDay = getToday();
  render();
  </script>
</body>
</html>
